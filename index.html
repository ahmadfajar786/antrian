<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DISPLAY ANTRIAN</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">

        <img src="logo.png" class="logo">

        <div class="title">
            <h1>SISTEM PEMANGGILAN ANTRIAN ONLINE</h1>
            <h3>KLINIK PRATAMA POLTEKKES KEMENKES MAKASSAR</h3>
            <p>Jl. Monumen. Emmy Saelan III No.42, Karunrung, Kec. Rappocini, Kota Makassar, Sulawesi Selatan<p>
        </div>

        <div class="clock">
            <div id="jam"></div>
            <div id="tanggal"></div>
        </div>

    </div>

    <div class="display">

        <h2>ANTRIAN SAAT INI</h2>

        <div id="nomor">1 - 10</div>

        <div id="status">Menunggu Pemanggilan...</div>

    </div>

    <div class="footer">
        <marquee id="running">
            Selamat Datang • Harap Menunggu Nomor Antrian Anda Dipanggil • Terima Kasih
        </marquee>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
